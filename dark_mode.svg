    <!-- ===== تعریف الگوی گرید ===== -->
    <defs>
        <pattern id="grid-small" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#30363d" stroke-width="0.5" stroke-opacity="0.30"/>
        </pattern>
        <pattern id="grid-large" width="100" height="100" patternUnits="userSpaceOnUse">
            <rect width="100" height="100" fill="url(#grid-small)"/>
            <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#30363d" stroke-width="1.2" stroke-opacity="0.30"/>
        </pattern>
    </defs>
    
    <!-- ===== پس‌زمینه با گرید ===== -->
    <rect width="1100" height="750" fill="#0d1117" rx="14" ry="14"/>
    <rect width="1100" height="750" fill="url(#grid-large)" rx="14" ry="14"/>
    <rect width="1100" height="750" fill="none" stroke="#30363d" stroke-width="1.5" rx="14" ry="14"/>
    
    <style>
        text { 
            font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
        }
        .header { 
            font-size: 28px; 
            fill: #58a6ff; 
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .header-sub { 
            font-size: 15px; 
            fill: #8b949e; 
        }
        .label { 
            font-size: 15px; 
            fill: #f0883e; 
            font-weight: 500;
        }
        .value { 
            font-size: 15px; 
            fill: #c9d1d9; 
        }
        .section-title { 
            font-size: 18px; 
            fill: #8b949e; 
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        .section-icon {
            fill: #58a6ff;
        }
        .separator {
            stroke: #30363d;
            stroke-width: 1;
            stroke-dasharray: 4,4;
        }
        .solid-separator {
            stroke: #30363d;
            stroke-width: 1.5;
        }
        .footer {
            font-size: 12px;
            fill: #8b949e;
        }
        .accent-text {
            fill: #f78166;
        }
        .ascii-art {
            fill: #58a6ff;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            white-space: pre;
            opacity: 0.7;
            letter-spacing: 0.2px;
        }
        .vertical-line {
            stroke: #30363d;
            stroke-width: 1;
            stroke-dasharray: 4,4;
        }
    </style>

